# .cpanel.yml - Auto Deployment Template untuk backend API.
# Frontend donation.xnv.my.id dibuild terpisah dari folder frontend/dist.

deployment:
  tasks:
    - export DEPLOYPATH=/home/arjawamy/api.xnv.biz.id

    - /bin/mkdir -p $DEPLOYPATH

    # Salin backend dan dokumentasi. node_modules/frontend/dist tidak perlu ikut repo deploy.
    - /bin/cp -R index.js package.json src docs README.md .env.example $DEPLOYPATH/

    # Catatan: Setelah deploy, masuk ke menu "Setup Node.js App"
    # di cPanel untuk menjalankan "Run NPM Install" dan "Restart Application".
